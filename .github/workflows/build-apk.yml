name: Compilar APK Debug

on:
  workflow_dispatch:  # Ejecución manual desde GitHub

jobs:
  build:
    name: Compilar APK Debug
    runs-on: ubuntu-latest
    
    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4
        
      # 2. Configurar JDK 17
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # 3. Configurar permisos para gradlew
      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        
      # 4. Compilar APK Debug
      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon
        
      # 5. Subir APK como artefacto
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: BuzonVoz-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
      # 6. (Opcional) Subir también el mapping.txt para debug
      - name: Subir mapping de debug
        uses: actions/upload-artifact@v4
        with:
          name: BuzonVoz-Mapping
          path: app/build/outputs/mapping/debug/mapping.txt
          retention-days: 30